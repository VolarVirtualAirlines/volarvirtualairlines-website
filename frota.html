<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota | Volar Virtual Airlines</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/LOGO_VOLAR_64x64_FAFICON_WEB.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<header class="navbar">

    <div class="logo-container">
        <a href="index.html">
            <img src="assets/LOGO_WEBSITE.png" alt="Logotipo Volar Virtual Airlines" class="logo">
        </a>
    </div>

    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="frota.html">Frota</a>
        <a href="index.html#sobre-nos">Sobre Nós</a>
        <a href="index.html#mapa">Online</a>
        <a href="index.html#parceiros">Parceiros</a>
        <a href="index.html#links">Links</a>

        <a href="https://newsky.app/pilot/login"
           target="_blank"
           rel="noopener noreferrer"
           class="btn-va">
            Crew Room
        </a>
    </nav>

</header>

<section id="frota" class="section">

    <h2>Nossa Frota</h2>

    <p style="max-width:900px;margin:auto;margin-bottom:40px;">
        Conheça a frota oficial da Volar Virtual Airlines e faça o download
        das liveries disponíveis para os simuladores suportados.
    </p>

    <!-- COLE AQUI A TABELA COMPLETA DA FROTA -->
    
</section>

<footer>
    <div class="footer-content">
        <img src="assets/LOGO_WEBSITE.png" alt="Volar Virtual Airlines Logo" class="footer-logo">
        <p>© 2026 Volar Virtual Airlines - Fly Beyond - ICAO: VVX</p>
    </div>
</footer>

<button id="btn-voltar-topo" title="Voltar ao topo">
    ↑
</button>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const btnTopo = document.getElementById("btn-voltar-topo");

    window.addEventListener('scroll', () => {
        if (window.scrollY > 400) {
            btnTopo.style.display = "flex";
        } else {
            btnTopo.style.display = "none";
        }
    });

    btnTopo.addEventListener("click", () => {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });

});
</script>

</body>
</html>
